name: Проверка и сборка

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Показать все файлы
        run: |
          echo "📁 Содержимое папки:"
          ls -la
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Установка зависимостей
        run: |
          pip install ursina
          pip install pyinstaller
          pip list  # покажет какие библиотеки установлены
      
      - name: Проверка кода
        run: |
          python -m py_compile D.py
          echo "✅ Синтаксис OK"
      
      - name: Сборка EXE с логами
        run: |
          echo "🔨 Начинаю сборку..."
          pyinstaller --onefile --windowed --collect-data ursina --name "МояИгра" D.py --log-level DEBUG
          echo "📁 После сборки:"
          ls -la
          echo "📁 Папка dist:"
          ls -la dist/ || echo "❌ Папка dist не создана"
      
      - name: Загрузка EXE
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-EXE
          path: dist/*.exe
          if-no-files-found: error  # покажет ошибку если файлов нет
